<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Fonte — Suivi Musculation</title>
<meta name="theme-color" content="#0E0F11">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0F11;
    --surface:#18191C;
    --surface-2:#212328;
    --line:#2C2F35;
    --text:#ECEDEF;
    --muted:#8B8F97;
    --accent:#F4C744;
    --accent-dim:#7a6423;
    --red:#D62828;
    --green:#4CAF6D;
    --radius:14px;
  }
  html[data-theme="light"]{
    --bg:#F5F3EE;
    --surface:#FFFFFF;
    --surface-2:#EFEDE6;
    --line:#DEDDD3;
    --text:#1C1D1F;
    --muted:#6B6F76;
    --accent:#B8860B;
    --accent-dim:#e4d4a1;
    --red:#C21E1E;
    --green:#2E7D46;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
    overscroll-behavior-y:none;
    transition:background .2s, color .2s;
  }
  #app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  h1,h2,h3{font-family:'Bebas Neue',sans-serif;letter-spacing:0.02em;margin:0;font-weight:400;}
  .mono{font-family:'Roboto Mono',monospace;font-variant-numeric:tabular-nums;}
  .topbar{
    position:sticky;top:0;z-index:5;background:var(--bg);opacity:0.98;backdrop-filter:blur(8px);
    display:flex;align-items:center;gap:8px;
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
    border-bottom:1px solid var(--line);
  }
  .topbar h1{font-size:22px;}
  .topbar .sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .btn{
    border:none;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:600;
    font-family:'Inter',sans-serif;cursor:pointer;transition:transform .08s ease, opacity .15s;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
    min-height:44px;
  }
  .btn:active{transform:scale(0.96);}
  .btn:disabled{opacity:0.4;}
  .btn-accent{background:var(--accent);color:#161206;}
  .btn-ghost{background:var(--surface-2);color:var(--text);}
  .btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent-dim);}
  .btn-danger{background:transparent;color:var(--red);border:1px solid #4a1a1a;}
  .btn-icon{background:var(--surface-2);color:var(--muted);width:44px;height:44px;padding:0;border-radius:50%;justify-content:center;flex-shrink:0;font-size:16px;}
  .btn-block{width:100%;justify-content:center;padding:14px;font-size:15px;}
  .btn-sm{padding:10px 14px;font-size:13px;min-height:40px;}
  .content{padding:16px 18px 110px;flex:1;}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:12px;
  }
  .card-tap{cursor:pointer;}
  .card-tap:active{background:var(--surface-2);}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .muted{color:var(--muted);}
  .tag{
    display:inline-block;background:var(--surface-2);color:var(--accent);font-size:11px;font-weight:700;
    padding:3px 9px;border-radius:20px;letter-spacing:0.03em;text-transform:uppercase;
  }
  .divider{height:1px;background:var(--line);margin:14px 0;}
  .section-label{
    font-family:'Bebas Neue',sans-serif;color:var(--accent);font-size:18px;letter-spacing:0.04em;
    margin:22px 0 8px;display:flex;align-items:center;gap:8px;
  }
  .section-label::after{content:'';flex:1;height:1px;background:var(--line);}
  .exo-row{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;
  }
  .exo-name{font-weight:600;font-size:15px;}
  .exo-meta{color:var(--muted);font-size:13px;margin-top:3px;}
  .exo-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .weight-pill{
    background:var(--surface-2);border-radius:10px;padding:4px 10px;font-size:13px;color:var(--accent);font-weight:700;
    display:flex;align-items:center;gap:6px;
  }
  .banner{
    background:var(--surface-2);border:1px solid var(--accent-dim);border-radius:12px;padding:12px 14px;
    margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:14px;
  }
  input, textarea, select{
    width:100%;background:var(--surface-2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:11px 12px;font-size:15px;font-family:'Inter',sans-serif;
  }
  input:focus, textarea:focus, select:focus{outline:2px solid var(--accent);outline-offset:1px;}
  label{font-size:12px;color:var(--muted);display:block;margin:12px 0 5px;text-transform:uppercase;letter-spacing:0.04em;}
  .field:first-child label{margin-top:0;}
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:20;display:flex;align-items:flex-end;
  }
  .modal{
    background:var(--surface);width:100%;max-width:560px;margin:0 auto;border-radius:20px 20px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
    border-top:1px solid var(--line);
    animation:slideup .18s ease-out;
  }
  @keyframes slideup{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal h2{font-size:20px;margin-bottom:14px;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions .btn{flex:1;}
  .empty{
    text-align:center;padding:50px 20px;color:var(--muted);
  }
  .empty h3{color:var(--text);font-size:24px;margin-bottom:8px;}
  .weekday-picker{display:flex;gap:6px;margin-top:4px;}
  .weekday-picker button{
    flex:1;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);border-radius:10px;
    padding:10px 0;font-size:13px;font-weight:700;cursor:pointer;
  }
  .weekday-picker button.active{background:var(--accent);color:#161206;border-color:var(--accent);}
  .sparkline{display:block;}
  .history-row{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
  /* workout mode */
  .workout{position:fixed;inset:0;background:var(--bg);z-index:30;display:flex;flex-direction:column;max-width:560px;margin:0 auto;}
  .workout-top{padding:calc(14px + env(safe-area-inset-top)) 18px 14px;display:flex;align-items:center;gap:10px;}
  .bottom-nav{
    position:fixed;left:0;right:0;bottom:0;z-index:15;
    max-width:560px;margin:0 auto;background:var(--surface);border-top:1px solid var(--line);
    display:flex;padding-bottom:env(safe-area-inset-bottom);
  }
  .nav-item{
    flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;
    align-items:center;gap:3px;padding:10px 0 8px;cursor:pointer;min-height:52px;
  }
  .nav-item.active{color:var(--accent);}
  .nav-item:active{opacity:0.6;}
  .nav-icon{font-size:20px;line-height:1;}
  .nav-label{font-size:11px;font-weight:600;}
  .progress-bar{height:4px;background:var(--surface-2);border-radius:4px;flex:1;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);transition:width .3s;}
  .workout-body{flex:1;overflow-y:auto;padding:0 18px 20px;display:flex;flex-direction:column;}
  .exo-hero{margin:6px 0 18px;}
  .exo-hero .tag{margin-bottom:8px;}
  .exo-hero h2{font-size:30px;line-height:1.05;}
  .set-tracker{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap;}
  .set-dot{
    width:32px;height:32px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);
  }
  .set-dot.done{background:var(--green);color:#0b1c10;border-color:var(--green);}
  .set-dot.current{background:var(--accent);color:#161206;border-color:var(--accent);}
  .log-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
  .goal-banner{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .goal-banner .n{font-family:'Roboto Mono',monospace;font-size:26px;font-weight:700;color:var(--accent);}
  .video-link{
    display:flex;align-items:center;gap:8px;color:var(--text);text-decoration:none;background:var(--surface-2);
    padding:10px 14px;border-radius:10px;font-size:14px;font-weight:600;margin-top:4px;
  }
  .footer-actions{padding:14px 18px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);display:flex;gap:10px;}
  .footer-actions .btn{flex:1;}
  /* rest / cardio timer */
  .rest-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .ring-wrap{position:relative;width:240px;height:240px;}
  .ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:var(--surface-2);stroke-width:14;}
  .ring-fg{fill:none;stroke:var(--accent);stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
  .ring-fg.alert{stroke:var(--red);}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring-center .time{font-family:'Roboto Mono',monospace;font-size:44px;font-weight:700;}
  .ring-center .label{color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;}
  .rest-controls{display:flex;gap:10px;margin-top:26px;}
  .flash{animation:flash 0.5s ease-in-out 3;}
  @keyframes flash{0%,100%{background:var(--bg);}50%{background:#2a1010;}}
  .toast{
    position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--surface-2);
    border:1px solid var(--line);color:var(--text);padding:10px 18px;border-radius:30px;font-size:14px;
    z-index:60;box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.record{border-color:var(--accent);color:var(--accent);font-weight:700;}
  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============ STORAGE ============ */
const STORAGE_KEY = 'fonteAppState_v1';
const uid = () => Math.random().toString(36).slice(2,10);

function ytSearch(name){
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(name + ' musculation technique exercice');
}

function ex(name, section, sets, rest, notes){
  return { id: uid(), name, section, videoUrl: ytSearch(name), sets: sets.split(',').map(s=>s.trim()), restSeconds: rest, notes: notes||'', lastWeight: null };
}

function seedProgram(){
  return {
    id: uid(),
    name: 'Vital Forme — Gregory',
    objectif: 'Prise de masse générale + sèche',
    seances: [
      {
        id: uid(), name: 'Séance 1', cardio: 'Cardio 50 min',
        exercises: [
          ex('Développé couché (ou assis)', 'Pectoraux', '15,15,10,10,8,8', 60, 'Super-set avec écarté à la poulie haute'),
          ex('Écarté poulie haute', 'Pectoraux', '15,15,10,10,8,8', 60, 'Super-set avec développé couché'),
          ex('Développé incliné', 'Pectoraux', '15,15,8,8,8', 60, ''),
          ex('Écarté machine ou haltères', 'Pectoraux', '15,15,10,10', 60, ''),
          ex('Pull-over', 'Pectoraux', '15,15,15', 60, ''),
          ex('Triceps — tirage poulie', 'Triceps', '20,20,15,10,8,12', 60, ''),
          ex('Triceps — développé front', 'Triceps', '12,12,8,8', 90, ''),
          ex('Triceps — kick-back', 'Triceps', '15,15,15', 60, 'Super-set avec dips machine'),
          ex('Dips machine', 'Triceps', '8,8,8', 60, 'Super-set avec kick-back'),
          ex('Crunch', 'Abdos', 'maxi,maxi,maxi,maxi,maxi', 30, 'Super-set avec crunch inversé'),
          ex('Crunch inversé', 'Abdos', 'maxi,maxi,maxi,maxi,maxi,maxi', 45, 'Super-set avec crunch'),
          ex('Relevés de jambes verticaux', 'Abdos', 'maxi,maxi,maxi,maxi', 45, ''),
        ]
      },
      {
        id: uid(), name: 'Séance 2', cardio: 'Elliptique — allure 3 / 50 min',
        exercises: [
          ex('Squat machine', 'Cuisses', '20,20,15,15,15', 60, ''),
          ex('Leg curl', 'Cuisses', '15,10,6,6', 60, ''),
          ex('Presse à 45°', 'Cuisses', '15,15,8,8', 45, 'Super-set avec ischios machine'),
          ex('Ischios machine', 'Cuisses', '12,12,12,8,8,8', 60, 'Super-set avec presse'),
          ex('Développé nuque (machine ou banc vertical)', 'Épaules', '15,15,10,10,6,6', 60, ''),
          ex('Développé haltères', 'Épaules', '12,12,12', 60, ''),
          ex('Élévations latérales + frontales', 'Épaules', '24,24,24', 60, 'Alterner latérales / frontales'),
          ex('Élévation latérale à la poulie', 'Épaules', '10,10,10', 60, ''),
          ex('Crunch', 'Abdos', 'maxi,maxi,maxi,maxi,maxi', 30, 'Super-set avec crunch inversé'),
          ex('Crunch inversé', 'Abdos', 'maxi,maxi,maxi,maxi,maxi,maxi', 45, 'Super-set avec crunch'),
        ]
      },
      {
        id: uid(), name: 'Séance 3', cardio: 'Elliptique — allure 2 / 50 min',
        exercises: [
          ex('Tirage poulie large derrière la nuque', 'Dos', '20,20,maxi,maxi,maxi,maxi', 60, 'Les 4 dernières séries en dégressif (drop-set), charge maxi'),
          ex('Tirage poulie serrée devant', 'Dos', '10,10,10,10', 60, ''),
          ex('Rowing machine ou poulie basse', 'Dos', '15,15,10,6,6', 60, ''),
          ex('Soulevé de terre', 'Dos', 'maxi,maxi,maxi', 90, ''),
          ex('Curl pupitre (Larry Scott)', 'Biceps', '20,15,12,12,8,8', 90, 'Dernières séries en répétitions forcées'),
          ex('Curl prise serrée barre droite', 'Biceps', '12,12,8,8', 60, 'Super-set avec curls alternés'),
          ex('Curl alternés', 'Biceps', '20,20,20,20', 60, 'Super-set avec curl prise serrée'),
          ex('Curl isolation alterné', 'Biceps', '12,12,12', 60, ''),
          ex('Crunch', 'Abdos', 'maxi,maxi,maxi,maxi,maxi', 30, ''),
          ex('Crunch inversé', 'Abdos', 'maxi,maxi,maxi,maxi,maxi,maxi', 45, ''),
          ex('Relevés de jambes verticaux', 'Abdos', 'maxi,maxi,maxi,maxi', 45, ''),
        ]
      },
      {
        id: uid(), name: 'Séance 4', cardio: 'Vélo 20 min (allure 7) + tapis de course 20 min',
        exercises: [
          ex('Obliques au banc', 'Obliques', 'maxi,maxi,maxi', 30, 'Alterner les côtés — super-set avec relevé de jambes obliques'),
          ex('Relevé de jambes obliques', 'Obliques', 'maxi,maxi,maxi', 30, 'Alterner les côtés — super-set avec obliques au banc'),
          ex('Crunchs obliques au sol', 'Obliques', 'maxi,maxi,maxi', 30, 'Alterner + finir par une série courte de 10 reps en haut du mouvement'),
          ex('Inclinaison avec charge', 'Obliques', '20,20,20,20', 45, 'Minimum 20 reps, alterner les côtés'),
          ex('Relevés de jambes verticaux', 'Abdos', 'maxi,maxi,maxi,maxi', 45, ''),
          ex('Crunchs inversés jambes tendues', 'Abdos', 'maxi,maxi,maxi,maxi', 45, ''),
          ex('Crunchs au banc 45°', 'Abdos', 'maxi,maxi,maxi,maxi,maxi,maxi', 30, ''),
          ex('Crunchs au banc à plat', 'Abdos', 'maxi,maxi,maxi,maxi', 30, ''),
        ]
      }
    ]
  };
}

function defaultSettings(){ return { theme:'dark', reminderDays:[], lastNotifDate:null }; }

function loadState(){
  let s = null;
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) s = JSON.parse(raw);
  }catch(e){}
  if(!s){ s = { programs:[seedProgram()], session:null, history:[], settings:defaultSettings() }; }
  if(!s.history) s.history = [];
  if(!s.settings) s.settings = defaultSettings();
  if(!('reminderDays' in s.settings)) s.settings.reminderDays = [];
  saveState(s);
  return s;
}
function saveState(s){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }catch(e){} }
let state = loadState();
function persist(){ saveState(state); }
document.documentElement.setAttribute('data-theme', state.settings.theme==='light'?'light':'dark');

/* ============ HELPERS ============ */
function findProgram(pid){ return state.programs.find(p=>p.id===pid); }
function findSeance(pid,sid){ const p=findProgram(pid); return p && p.seances.find(s=>s.id===sid); }
function findExercise(pid,sid,eid){ const s=findSeance(pid,sid); return s && s.exercises.find(e=>e.id===eid); }
function groupedExercises(seance){
  const groups = [];
  seance.exercises.forEach(exo=>{
    let g = groups.find(g=>g.section===exo.section);
    if(!g){ g={section:exo.section, list:[]}; groups.push(g); }
    g.list.push(exo);
  });
  return groups;
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' });
}
function todayStr(){ return new Date().toISOString().slice(0,10); }

function navigate(hash){ location.hash = hash; }
let lastRouteWasWorkout = false;
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', ()=>{ render(); maybeNotifyReminder(); });

/* ============ AUDIO / VIBRATION ============ */
let audioCtx = null;
function unlockAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function beep(){
  if(!audioCtx) return;
  const times=[0,0.32,0.64];
  times.forEach(t=>{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type='square'; o.frequency.value=880;
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.35, audioCtx.currentTime+t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+t+0.25);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime+t); o.stop(audioCtx.currentTime+t+0.26);
  });
}
function ringDone(){
  beep();
  if(navigator.vibrate) navigator.vibrate([300,120,300,120,500]);
}

/* ============ WAKE LOCK ============ */
let wakeLock = null;
async function requestWakeLock(){
  if(!('wakeLock' in navigator)) return;
  try{ wakeLock = await navigator.wakeLock.request('screen'); }catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; }
}
document.addEventListener('visibilitychange', async ()=>{
  if(document.visibilityState==='visible' && state.session) await requestWakeLock();
});

/* ============ NOTIFICATIONS / REMINDER ============ */
const WEEKDAYS = ['SU','MO','TU','WE','TH','FR','SA'];
const WEEKDAY_LABELS = {MO:'Lu',TU:'Ma',WE:'Me',TH:'Je',FR:'Ve',SA:'Sa',SU:'Di'};
function reminderDueToday(){
  const days = state.settings.reminderDays||[];
  if(days.length===0) return false;
  const today = WEEKDAYS[new Date().getDay()];
  if(!days.includes(today)) return false;
  const doneToday = state.history.some(h=>h.date.slice(0,10)===todayStr());
  return !doneToday;
}
function maybeNotifyReminder(){
  if(!reminderDueToday()) return;
  if(state.settings.lastNotifDate===todayStr()) return;
  if('Notification' in window && Notification.permission==='granted'){
    try{ new Notification('Fonte 💪', { body:'Séance prévue aujourd\u2019hui — direction la salle !' }); }catch(e){}
  }
  state.settings.lastNotifDate = todayStr();
  persist();
}

/* ============ HISTORY / STATS ============ */
function exerciseHistoryPoints(exerciseId){
  const pts = [];
  state.history.forEach(h=>{
    const e = h.exercises.find(x=>x.exerciseId===exerciseId);
    if(e){
      const weights = e.sets.map(s=>s.weight).filter(w=>w!=null && !isNaN(w));
      if(weights.length){ pts.push({ date:h.date, weight: Math.max(...weights) }); }
    }
  });
  return pts;
}
function exerciseBest(exerciseId){
  let bestWeight=0, bestReps=0;
  state.history.forEach(h=>{
    h.exercises.forEach(e=>{
      if(e.exerciseId===exerciseId){
        e.sets.forEach(s=>{
          if(s.weight!=null && s.weight>bestWeight) bestWeight=s.weight;
          if(s.repsDone!=null && s.repsDone>bestReps) bestReps=s.repsDone;
        });
      }
    });
  });
  return { bestWeight, bestReps };
}
function sparklineSvg(points, w, h){
  if(points.length < 2){
    return `<svg class="sparkline" width="${w}" height="${h}"></svg>`;
  }
  const vals = points.map(p=>p.weight);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max-min) || 1;
  const stepX = w / (points.length-1);
  const coords = points.map((p,i)=>{
    const x = i*stepX;
    const y = h - ((p.weight-min)/range) * (h-4) - 2;
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${coords}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

/* ============ MODAL / TOAST ============ */
function openModal(html, afterMount){
  closeModal();
  const bd = document.createElement('div');
  bd.className='modal-backdrop';
  bd.id='modalBackdrop';
  bd.innerHTML = '<div class="modal">'+html+'</div>';
  bd.addEventListener('click', (e)=>{ if(e.target===bd) closeModal(); });
  document.body.appendChild(bd);
  if(afterMount) afterMount(bd);
}
function closeModal(){ const m=document.getElementById('modalBackdrop'); if(m) m.remove(); }
function toast(msg, isRecord){
  const t=document.createElement('div'); t.className='toast'+(isRecord?' record':''); t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}

/* ============ RENDER ROOT ============ */
function render(){
  const app = document.getElementById('app');
  const hash = location.hash || '#/';
  const parts = hash.slice(2).split('/').filter(Boolean);

  const isWorkout = parts[0]==='workout';
  if(lastRouteWasWorkout && !isWorkout){ releaseWakeLock(); }
  lastRouteWasWorkout = isWorkout;

  if(parts[0]==='workout' && parts[1] && parts[2]){ renderWorkout(app, parts[1], parts[2]); return; }
  if(parts[0]==='seance' && parts[1] && parts[2]){ renderSeance(app, parts[1], parts[2]); return; }
  if(parts[0]==='program' && parts[1]){ renderProgramView(app, parts[1]); return; }
  if(parts[0]==='history'){ renderHistory(app); return; }
  if(parts[0]==='settings'){ renderSettings(app); return; }
  renderHome(app);
}

/* ============ BOTTOM NAV ============ */
function bottomNavHtml(active){
  const items = [
    {key:'home', icon:'🏠', label:'Accueil', hash:'#/'},
    {key:'history', icon:'🕒', label:'Historique', hash:'#/history'},
    {key:'settings', icon:'⚙', label:'Réglages', hash:'#/settings'},
  ];
  return `<div class="bottom-nav">${items.map(it=>`
    <button class="nav-item ${active===it.key?'active':''}" data-nav="${it.hash}">
      <span class="nav-icon">${it.icon}</span>
      <span class="nav-label">${it.label}</span>
    </button>`).join('')}</div>`;
}
function bindBottomNav(app){
  app.querySelectorAll('.bottom-nav [data-nav]').forEach(b=>{
    b.addEventListener('click', ()=> navigate(b.dataset.nav));
  });
}

/* ============ SETTINGS ============ */
function renderSettings(app){
  app.innerHTML = `
    <div class="topbar">
      <button class="btn-icon" id="btnBack">←</button>
      <h1 style="font-size:20px;">Réglages</h1>
    </div>
    <div class="content" id="settingsBody"></div>
    ${bottomNavHtml('settings')}
  `;
  app.querySelector('#btnBack').addEventListener('click', ()=>navigate('#/'));
  bindBottomNav(app);
  const body = app.querySelector('#settingsBody');
  body.innerHTML = `
    <div class="card">
      <div class="row">
        <div>
          <div style="font-weight:700;">Apparence</div>
          <div class="muted" style="font-size:13px;">${state.settings.theme==='light'?'Mode clair':'Mode sombre'}</div>
        </div>
        <button class="btn btn-ghost" id="btnTheme">${state.settings.theme==='light'?'🌙 Sombre':'☀️ Clair'}</button>
      </div>
    </div>

    <div class="card">
      <div style="font-weight:700;margin-bottom:4px;">Rappel de séance</div>
      <div class="muted" style="font-size:13px;margin-bottom:10px;">Choisis les jours où tu t'entraînes. Une bannière (et une notification si activée) t'avertira sur l'écran d'accueil.</div>
      <div class="weekday-picker" id="weekdayPicker">
        ${['MO','TU','WE','TH','FR','SA','SU'].map(d=>`<button data-day="${d}" class="${state.settings.reminderDays.includes(d)?'active':''}">${WEEKDAY_LABELS[d]}</button>`).join('')}
      </div>
      <button class="btn btn-outline btn-block" id="btnNotifPerm" style="margin-top:12px;">🔔 Activer les notifications</button>
      <div class="muted" style="font-size:12px;margin-top:8px;">Note : les notifications ne fonctionnent que si l'app est ouverte ou installée sur l'écran d'accueil — un vrai rappel en arrière-plan nécessiterait un serveur.</div>
    </div>

    <div class="card">
      <div style="font-weight:700;margin-bottom:10px;">Données</div>
      <button class="btn btn-ghost btn-block" id="btnExport" style="margin-bottom:8px;">⬇ Exporter mes données (JSON)</button>
      <label style="margin:0 0 6px;">Importer un fichier</label>
      <input type="file" id="fileImport" accept="application/json">
    </div>
  `;

  body.querySelector('#btnTheme').addEventListener('click', ()=>{
    state.settings.theme = state.settings.theme==='light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', state.settings.theme);
    persist(); render();
  });

  body.querySelectorAll('[data-day]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const d = btn.dataset.day;
      const days = state.settings.reminderDays;
      const idx = days.indexOf(d);
      if(idx>-1) days.splice(idx,1); else days.push(d);
      persist(); render();
    });
  });

  body.querySelector('#btnNotifPerm').addEventListener('click', async ()=>{
    if(!('Notification' in window)){ toast('Notifications non supportées sur ce navigateur'); return; }
    const perm = await Notification.requestPermission();
    if(perm==='granted') toast('Notifications activées ✓');
    else toast('Notifications refusées');
  });

  body.querySelector('#btnExport').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'fonte-data-'+todayStr()+'.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  body.querySelector('#fileImport').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        if(!parsed.programs || !Array.isArray(parsed.programs)) throw new Error('format invalide');
        if(!parsed.history) parsed.history = [];
        if(!parsed.settings) parsed.settings = defaultSettings();
        state = parsed;
        persist();
        document.documentElement.setAttribute('data-theme', state.settings.theme==='light'?'light':'dark');
        toast('Données importées ✓');
        navigate('#/');
      }catch(err){
        toast('Fichier invalide');
      }
    };
    reader.readAsText(file);
  });
}

  });
  list.querySelectorAll('[data-start]').forEach(el=>{

  });
  list.querySelectorAll('[data-del-seance]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const sid = el.dataset.delSeance;
      openModal(`

        <div class="modal-actions">

function editExerciseModal(pid, sid, eid){
  const seance = findSeance(pid, sid);
  const isNew = !eid;
  const exo = isNew ? { id: uid(), name:'', section: seance.exercises.length? seance.exercises[seance.exercises.length-1].section : 'Général', videoUrl:'', sets:['12','12','12'], restSeconds:60, notes:'', lastWeight:null } : findExercise(pid,sid,eid);

  openModal(`
    <h2>${isNew? 'Nouvel exercice' : 'Modifier l’exercice'}</h2>
    <div class="field"><label>Nom de l'exercice</label><input id="fName" value="${escapeHtml(exo.name)}" placeholder="Ex : Développé couché"></div>
    <div class="field"><label>Groupe musculaire / section</label><input id="fSection" value="${escapeHtml(exo.section)}" placeholder="Ex : Pectoraux"></div>
    <div class="field"><label>Lien vidéo (YouTube ou autre)</label><input id="fVideo" value="${escapeHtml(exo.videoUrl)}"></div>
    <div class="field"><label>Séries (répétitions séparées par des virgules, "maxi" possible)</label><input id="fSets" value="${escapeHtml(exo.sets.join(', '))}" placeholder="Ex : 15, 12, 10, 8"></div>
    <div class="field"><label>Repos entre séries (secondes)</label><input id="fRest" type="number" value="${exo.restSeconds}"></div>
    <div class="field"><label>Notes (super-set, tempo, etc.)</label><input id="fNotes" value="${escapeHtml(exo.notes)}"></div>
    <div class="field"><label>Dernier poids utilisé (kg)</label><input id="fWeight" type="number" step="0.5" value="${exo.lastWeight!=null?exo.lastWeight:''}"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="mCancel">Annuler</button>
      <button class="btn btn-accent" id="mSave">Enregistrer</button>
    </div>
  `, (bd)=>{
    bd.querySelector('#mCancel').addEventListener('click', closeModal);
    bd.querySelector('#mSave').addEventListener('click', ()=>{
      const name = bd.querySelector('#fName').value.trim();
      if(!name){ toast('Le nom est obligatoire'); return; }
      exo.name = name;
      exo.section = bd.querySelector('#fSection').value.trim() || 'Général';
      exo.videoUrl = bd.querySelector('#fVideo').value.trim() || ytSearch(name);
      const setsRaw = bd.querySelector('#fSets').value.trim();
      exo.sets = setsRaw ? setsRaw.split(',').map(s=>s.trim()).filter(Boolean) : ['12'];
      exo.restSeconds = parseInt(bd.querySelector('#fRest').value) || 60;
      exo.notes = bd.querySelector('#fNotes').value.trim();
      const w = bd.querySelector('#fWeight').value;
      exo.lastWeight = w==='' ? null : parseFloat(w);
      if(isNew) seance.exercises.push(exo);
      persist(); closeModal(); render();
    });
  });
}

/* ============ WORKOUT MODE ============ */
function parseCardioMinutes(text){
  if(!text) return 0;
  const matches = [...text.matchAll(/(\d+)\s*(?:mn|min)/gi)];
  if(matches.length===0) return 0;
  return matches.reduce((sum,m)=>sum+parseInt(m[1]),0);
}

function startWorkout(pid, sid){
  unlockAudio();
  requestWakeLock();
  const seance = findSeance(pid, sid);
  const hasCardio = !!(seance && seance.cardio);
  state.session = { pid, sid, exIdx:0, setIdx:0, phase: hasCardio ? 'cardio' : 'log', weightDraft:null, log:{}, cardioElapsed:0, cardioRunning:false };
  persist();
  navigate('#/workout/'+pid+'/'+sid);
}

let restTimer = null;
let cardioTimer = null;

function renderWorkout(app, pid, sid){
  const prog = findProgram(pid);
  const seance = findSeance(pid, sid);
  if(!seance){ navigate('#/'); return; }
  if(!state.session || state.session.pid!==pid || state.session.sid!==sid){
    const hasCardio = !!(seance.cardio);
    state.session = { pid, sid, exIdx:0, setIdx:0, phase: hasCardio?'cardio':'log', weightDraft:null, log:{}, cardioElapsed:0, cardioRunning:false };
    persist();
  }
  requestWakeLock();
  const sess = state.session;
  const exercises = seance.exercises;

  if(sess.phase==='cardio'){
    renderCardioPhase(app, pid, sid, seance);
    return;
  }

  if(sess.exIdx >= exercises.length){
    renderWorkoutFinished(app, pid, sid, prog, seance);
    return;
  }

  const exo = exercises[sess.exIdx];
  const totalSets = exo.sets.length;
  const target = exo.sets[sess.setIdx];
  const progressPct = Math.round(((sess.exIdx + sess.setIdx/totalSets) / exercises.length) * 100);

  app.innerHTML = `
    <div class="workout">
      <div class="workout-top">
        <button class="btn-icon" id="btnExit">✕</button>
        <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
        <span class="muted mono" style="font-size:12px;">${sess.exIdx+1}/${exercises.length}</span>
      </div>
      <div class="workout-body" id="wbody"></div>
    </div>
  `;
  bindExitButton(app, pid, sid);

  const wbody = app.querySelector('#wbody');
  if(sess.phase==='rest'){ renderRestPhase(wbody, pid, sid, exo); return; }

  const weightVal = sess.weightDraft!=null ? sess.weightDraft : (exo.lastWeight!=null? exo.lastWeight : '');
  const isMaxi = String(target).toLowerCase()==='maxi';
  const best = exerciseBest(exo.id);
  const pts = exerciseHistoryPoints(exo.id);

  wbody.innerHTML = `
    <div class="exo-hero">
      <span class="tag">${escapeHtml(exo.section)}</span>
      <h2>${escapeHtml(exo.name)}</h2>
      ${exo.notes? `<div class="muted" style="margin-top:6px;font-size:14px;">${escapeHtml(exo.notes)}</div>`:''}
      <a class="video-link" href="${exo.videoUrl}" target="_blank" rel="noopener">▶ Voir la vidéo de l'exercice</a>
    </div>
    <div class="set-tracker">
      ${exo.sets.map((s,i)=>`<div class="set-dot ${i<sess.setIdx?'done':(i===sess.setIdx?'current':'')}">${i+1}</div>`).join('')}
    </div>
    <div class="goal-banner">
      <div>
        <div class="muted" style="font-size:12px;text-transform:uppercase;">Série ${sess.setIdx+1} / ${totalSets} — objectif</div>
        <div class="n">${isMaxi? 'MAXI' : target+' reps'}</div>
      </div>
      ${best.bestWeight>0? `<div style="text-align:right;">
        <div class="muted" style="font-size:11px;">record</div>
        <div style="color:var(--accent);font-weight:700;">🏆 ${best.bestWeight} kg</div>
        ${pts.length>1?sparklineSvg(pts,60,20):''}
      </div>` : ''}
    </div>
    <div class="log-grid">
      <div class="field">
        <label>Répétitions faites</label>
        <input type="number" id="fRepsDone" inputmode="numeric" placeholder="${isMaxi?'ex: 22':target}">
      </div>
      <div class="field">
        <label>Poids (kg)</label>
        <input type="number" step="0.5" id="fWeight" inputmode="decimal" value="${weightVal}" placeholder="ex: 40">
      </div>
    </div>
    <div style="margin-top:auto;padding-top:20px;">
      <button class="btn btn-accent btn-block" id="btnValidate">✓ Valider la série</button>
      <button class="btn btn-ghost btn-block" id="btnSkipSection" style="margin-top:10px;">Passer cette partie ▶▶</button>
    </div>
  `;

  wbody.querySelector('#fWeight').addEventListener('input', (e)=>{
    sess.weightDraft = e.target.value === '' ? null : parseFloat(e.target.value);
  });

  wbody.querySelector('#btnValidate').addEventListener('click', ()=>{
    unlockAudio();
    const wRaw = wbody.querySelector('#fWeight').value;
    const rRaw = wbody.querySelector('#fRepsDone').value;
    const w = wRaw==='' ? null : parseFloat(wRaw);
    const repsDone = rRaw==='' ? null : parseFloat(rRaw);

    if(w!=null){
      const prevBest = exerciseBest(exo.id);
      if(prevBest.bestWeight>0 && w>prevBest.bestWeight) toast('🏆 Nouveau record de poids : '+w+' kg !', true);
      exo.lastWeight = w;
    }
    if(repsDone!=null){
      const prevBest = exerciseBest(exo.id);
      if(prevBest.bestReps>0 && repsDone>prevBest.bestReps) toast('🏆 Nouveau record de répétitions : '+repsDone+' !', true);
    }

    if(!sess.log[exo.id]) sess.log[exo.id] = { exerciseId: exo.id, name: exo.name, section: exo.section, sets: [] };
    sess.log[exo.id].sets.push({ target, repsDone, weight: w });

    if(sess.setIdx < totalSets - 1){
      sess.setIdx += 1;
      sess.phase = 'rest';
      sess.restRemaining = exo.restSeconds;
    } else {
      sess.exIdx += 1;
      sess.setIdx = 0;
      sess.weightDraft = null;
      if(sess.exIdx < exercises.length){
        sess.phase = 'rest';
        sess.restRemaining = exo.restSeconds;
      } else {
        sess.phase = 'log';
      }
    }
    persist();
    render();
  });

  wbody.querySelector('#btnSkipSection').addEventListener('click', ()=>{
    const curSection = exo.section;
    let nextIdx = exercises.findIndex((e,i)=> i>sess.exIdx && e.section!==curSection);
    if(nextIdx===-1) nextIdx = exercises.length;
    sess.exIdx = nextIdx;
    sess.setIdx = 0;
    sess.weightDraft = null;
    sess.phase = 'log';
    persist(); render();
  });
}

function bindExitButton(app, pid, sid){
  app.querySelector('#btnExit').addEventListener('click', ()=>{
    openModal(`
      <h2>Quitter la séance ?</h2>
      <p class="muted">Ta progression sur cette séance sera perdue.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="mCancel">Continuer</button>
        <button class="btn btn-danger" id="mQuit">Quitter</button>
      </div>
    `, (bd)=>{
      bd.querySelector('#mCancel').addEventListener('click', closeModal);
      bd.querySelector('#mQuit').addEventListener('click', ()=>{
        if(restTimer) clearInterval(restTimer);
        if(cardioTimer) clearInterval(cardioTimer);
        releaseWakeLock();
        state.session = null; persist(); closeModal();
        navigate('#/seance/'+pid+'/'+sid);
      });
    });
  });
}

function renderCardioPhase(app, pid, sid, seance){
  const sess = state.session;
  const suggested = parseCardioMinutes(seance.cardio) || 20;
  if(sess.cardioTarget==null) sess.cardioTarget = suggested*60;

  app.innerHTML = `
    <div class="workout">
      <div class="workout-top">
        <button class="btn-icon" id="btnExit">✕</button>
        <div class="progress-bar"><div class="progress-fill" style="width:2%"></div></div>
        <span class="muted mono" style="font-size:12px;">Cardio</span>
      </div>
      <div class="workout-body" id="wbody"></div>
    </div>
  `;
  bindExitButton(app, pid, sid);
  const wbody = app.querySelector('#wbody');

  const circumference = 2*Math.PI*100;

  wbody.innerHTML = `
    <div class="rest-screen">
      <span class="tag">Échauffement cardio</span>
      <h2 style="margin-top:10px;font-size:24px;text-align:center;">${escapeHtml(seance.cardio)}</h2>
      <div class="ring-wrap" style="margin-top:18px;">
        <svg viewBox="0 0 220 220">
          <circle class="ring-bg" cx="110" cy="110" r="100"></circle>
          <circle class="ring-fg" id="ringFg" cx="110" cy="110" r="100" stroke-dasharray="${circumference}" stroke-dashoffset="0"></circle>
        </svg>
        <div class="ring-center">
          <div class="time mono" id="timeLabel">00:00</div>
          <div class="label">/ ${Math.round(sess.cardioTarget/60)} min</div>
        </div>
      </div>
      <div class="rest-controls">
        <button class="btn btn-ghost" id="btnMinus">−5 min</button>
        <button class="btn btn-accent" id="btnPlayPause">${sess.cardioRunning?'⏸ Pause':'▶ Démarrer'}</button>
        <button class="btn btn-ghost" id="btnPlus">+5 min</button>
      </div>
      <button class="btn btn-outline btn-block" id="btnSkipCardio" style="margin-top:22px;max-width:280px;">Passer au renforcement musculaire ▶</button>
    </div>
  `;

  const ringFg = wbody.querySelector('#ringFg');
  const timeLabel = wbody.querySelector('#timeLabel');

  function fmtMMSS(sec){
    const m = Math.floor(sec/60), s = sec%60;
    return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }
  function updateRing(){
    const pct = Math.min(1, sess.cardioElapsed / sess.cardioTarget);
    ringFg.setAttribute('stroke-dashoffset', circumference*(1-pct));
    timeLabel.textContent = fmtMMSS(sess.cardioElapsed);
  }
  updateRing();

  if(cardioTimer) clearInterval(cardioTimer);
  if(sess.cardioRunning) startCardioTicking();

  function startCardioTicking(){
    if(cardioTimer) clearInterval(cardioTimer);
    cardioTimer = setInterval(()=>{
      sess.cardioElapsed += 1;
      if(sess.cardioElapsed >= sess.cardioTarget){
        clearInterval(cardioTimer);
        sess.cardioRunning = false;
        ringDone();
        persist();
        render();
        return;
      }
      persist();
      updateRing();
    }, 1000);
  }

  wbody.querySelector('#btnPlayPause').addEventListener('click', ()=>{
    unlockAudio();
    sess.cardioRunning = !sess.cardioRunning;
    if(sess.cardioRunning) startCardioTicking(); else clearInterval(cardioTimer);
    persist(); render();
  });
  wbody.querySelector('#btnMinus').addEventListener('click', ()=>{
    sess.cardioTarget = Math.max(60, sess.cardioTarget-300);
    persist(); updateRing();
    wbody.querySelector('.label').textContent = '/ '+Math.round(sess.cardioTarget/60)+' min';
  });
  wbody.querySelector('#btnPlus').addEventListener('click', ()=>{
    sess.cardioTarget += 300;
    persist(); updateRing();
    wbody.querySelector('.label').textContent = '/ '+Math.round(sess.cardioTarget/60)+' min';
  });
  wbody.querySelector('#btnSkipCardio').addEventListener('click', ()=>{
    if(cardioTimer) clearInterval(cardioTimer);
    sess.phase = 'log';
    persist(); render();
  });
}

function renderRestPhase(wbody, pid, sid, exo){
  const sess = state.session;
  const total = exo.restSeconds;
  let remaining = sess.restRemaining != null ? sess.restRemaining : total;
  const circumference = 2 * Math.PI * 100;

  wbody.innerHTML = `
    <div class="rest-screen" id="restScreen">
      <span class="tag">Repos</span>
      <div class="ring-wrap" style="margin-top:14px;">
        <svg viewBox="0 0 220 220">
          <circle class="ring-bg" cx="110" cy="110" r="100"></circle>
          <circle class="ring-fg" id="ringFg" cx="110" cy="110" r="100"
            stroke-dasharray="${circumference}" stroke-dashoffset="0"></circle>
        </svg>
        <div class="ring-center">
          <div class="time mono" id="timeLabel">${remaining}</div>
          <div class="label">secondes</div>
        </div>
      </div>
      <div class="rest-controls">
        <button class="btn btn-ghost" id="btnMinus">−15s</button>
        <button class="btn btn-ghost" id="btnPlus">+15s</button>
      </div>
      <button class="btn btn-outline btn-block" id="btnSkip" style="margin-top:22px;max-width:260px;">Passer le repos</button>
      <div class="muted" style="margin-top:14px;text-align:center;font-size:13px;">Prochain : ${escapeHtml(exo.name)} — série ${sess.setIdx+1}</div>
    </div>
  `;

  const ringFg = wbody.querySelector('#ringFg');
  const timeLabel = wbody.querySelector('#timeLabel');
  const restScreen = wbody.querySelector('#restScreen');

  function updateRing(){
    const pct = Math.max(0, remaining/total);
    ringFg.setAttribute('stroke-dashoffset', circumference * (1-pct));
    timeLabel.textContent = Math.max(0,remaining);
  }
  updateRing();

  function finishRest(){
    clearInterval(restTimer);
    ringDone();
    restScreen.classList.add('flash');
    ringFg.classList.add('alert');
    timeLabel.textContent = '0';
    setTimeout(()=>{
      sess.phase = 'log';
      sess.restRemaining = null;
      persist();
      render();
    }, 900);
  }

  if(restTimer) clearInterval(restTimer);
  restTimer = setInterval(()=>{
    remaining -= 1;
    sess.restRemaining = remaining;
    if(remaining <= 0){ finishRest(); } else { updateRing(); }
  }, 1000);

  wbody.querySelector('#btnMinus').addEventListener('click', ()=>{
    remaining = Math.max(5, remaining-15);
    sess.restRemaining = remaining; persist();
    updateRing();
  });
  wbody.querySelector('#btnPlus').addEventListener('click', ()=>{
    remaining += 15;
    sess.restRemaining = remaining; persist();
    updateRing();
  });
  wbody.querySelector('#btnSkip').addEventListener('click', ()=>{
    clearInterval(restTimer);
    sess.phase = 'log';
    sess.restRemaining = null;
    persist();
    render();
  });
}

function renderWorkoutFinished(app, pid, sid, prog, seance){
  const sess = state.session;
  app.innerHTML = `
    <div class="workout">
      <div class="workout-top">
        <span></span>
      </div>
      <div class="workout-body" id="wbody"></div>
    </div>
  `;
  const wbody = app.querySelector('#wbody');
  wbody.innerHTML = `
    <div class="rest-screen">
      <h2 style="font-size:38px;color:var(--accent);text-align:center;">Séance terminée 💪</h2>
      <p class="muted" style="text-align:center;">Bien joué. Ajoute une note si tu veux (optionnel), puis enregistre.</p>
      <div class="field" style="width:100%;max-width:320px;margin-top:10px;">
        <label>Note sur la séance</label>
        <textarea id="fNote" rows="2" placeholder="Ex : bonne forme, dos un peu fatigué..."></textarea>
      </div>
      <button class="btn btn-accent btn-block" id="btnFinish" style="margin-top:20px;max-width:320px;">Enregistrer et terminer</button>
    </div>
  `;
  wbody.querySelector('#btnFinish').addEventListener('click', ()=>{
    const note = wbody.querySelector('#fNote').value.trim();
    let volumeTotal = 0;
    const exList = Object.values(sess.log);
    exList.forEach(e=> e.sets.forEach(s=>{ if(s.weight!=null && s.repsDone!=null) volumeTotal += s.weight*s.repsDone; }));
    state.history.push({
      id: uid(), pid, sid, seanceName: seance.name, programName: prog.name,
      date: new Date().toISOString(), note, volumeTotal, exercises: exList
    });
    releaseWakeLock();
    state.session = null;
    persist();
    navigate('#/seance/'+pid+'/'+sid);
  });
}

/* ============ SERVICE WORKER ============ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
